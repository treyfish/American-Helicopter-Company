<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
    background: #0B0E13 radial-gradient(90% 70% at 85% 90%, rgba(200,16,46,.18) 0%, rgba(200,16,46,0) 60%);
    color: #F2EEE4; font-family: 'Libre Franklin', sans-serif; padding: 8vw;
  }
  .num { font-family: 'Big Shoulders Display', sans-serif; font-weight: 900; font-size: clamp(6rem, 20vw, 16rem); line-height: .85; color: transparent; -webkit-text-stroke: 2px rgba(242,238,228,.28); }
  h1 { font-family: 'Big Shoulders Display', sans-serif; font-weight: 800; text-transform: uppercase; font-size: clamp(2.2rem, 6vw, 4.5rem); letter-spacing: -.01em; margin-top: 1.5rem; }
  h1 span { color: #C8102E; }
  p { color: #8A94A6; max-width: 34rem; line-height: 1.7; margin-top: 1.25rem; }
  a.btn {
    display: inline-block; margin-top: 2.5rem; background: #C8102E; color: #F2EEE4; text-decoration: none;
    font-weight: 600; font-size: .78rem; letter-spacing: .22em; text-transform: uppercase; padding: 1.05rem 2.2rem;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    transition: transform .3s ease; box-shadow: 0 4px 18px rgba(200,16,46,.32);
  }
  a.btn:hover { transform: translateY(-3px); }
  a.btn:focus-visible { outline: 2px solid #E8362F; outline-offset: 3px; }
</style>
</head>
<body>
  <div class="num">404</div>
  <h1>Off the flight path<span>.</span></h1>
  <p>This page isn't on our charts. Head back to the hangar — the fleet, the configurator, and the crew are all there.</p>
  <a class="btn" href="/">Return to Base</a>
</body>
